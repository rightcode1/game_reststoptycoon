name: reststop_tycoon
description: Korean expressway rest-stop management tycoon prototype built with Flutter and Flame.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/vehicles/
    - assets/images/floor/
    - assets/reference/
